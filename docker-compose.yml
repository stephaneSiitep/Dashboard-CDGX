version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cdgxpress_db
    environment:
      POSTGRES_USER: cdgxpress_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cdgxpress
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdgxpress_user -d cdgxpress"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: cdgxpress_backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: cdgxpress_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cdgxpress
      POSTGRES_PORT: 5432
    restart: unless-stopped

  pinger:
    build: ./pinger
    container_name: cdgxpress_pinger
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: cdgxpress_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cdgxpress
      POSTGRES_PORT: 5432
      PING_INTERVAL: 300
    restart: unless-stopped

volumes:
  db_data:
